<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt – TFW Rechner</title>
  <meta name="description" content="Kontaktformular des TFW Rechners. Feedback, Fehler oder Verbesserungsvorschl&auml;ge melden.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://tfw-rechner.de/kontakt.html">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "TFW Rechner", "item": "https://tfw-rechner.de/" },
      { "@type": "ListItem", "position": 2, "name": "Kontakt", "item": "https://tfw-rechner.de/kontakt.html" }
    ]
  }
  </script>

  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <main class="container">
    <header>
      <div class="lang-switch">
        <button class="lang-btn active" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <a href="index.html" class="back-link" data-i18n="backToCalculator">&larr; Zur&uuml;ck zum Rechner</a>
    </header>

    <section class="page-content">
      <h1 data-i18n="contactTitle">Kontakt</h1>
      <p class="contact-intro" data-i18n="contactIntro">Anregungen, Fehler oder Feedback? Schreib mir eine Nachricht:</p>
      <form id="contact-form" class="contact-form" action="https://formsubmit.co/info@tfw-rechner.de" method="POST">
        <!-- FormSubmit.co config -->
        <input type="hidden" name="_subject" value="TFW-Rechner: Kontaktformular">
        <input type="hidden" name="_captcha" value="true">
        <input type="hidden" name="_next" value="https://tfw-rechner.de/kontakt.html#success">
        <input type="text" name="_honey" style="display:none">
        <div class="form-group">
          <label for="contact-name" data-i18n="contactName">Name</label>
          <input type="text" id="contact-name" name="name" required>
        </div>
        <div class="form-group">
          <label for="contact-email" data-i18n="contactEmail">E-Mail</label>
          <input type="email" id="contact-email" name="email" required>
        </div>
        <div class="form-group">
          <label for="contact-subject" data-i18n="contactSubject">Betreff</label>
          <select id="contact-subject" name="subject">
            <option value="Feedback" data-i18n="contactSubjectFeedback">Feedback</option>
            <option value="Bug" data-i18n="contactSubjectBug">Fehler melden</option>
            <option value="Feature" data-i18n="contactSubjectFeature">Verbesserungsvorschlag</option>
            <option value="Sonstiges" data-i18n="contactSubjectOther">Sonstiges</option>
          </select>
        </div>
        <div class="form-group">
          <label for="contact-message" data-i18n="contactMessage">Nachricht</label>
          <textarea id="contact-message" name="message" rows="4" required></textarea>
        </div>
        <button type="submit" class="contact-submit" data-i18n="contactSend">Nachricht senden</button>
      </form>
      <p class="contact-success hidden" id="contact-success" data-i18n="contactSuccess">Danke f&uuml;r deine Nachricht! Sie wurde erfolgreich gesendet.</p>
    </section>

    <footer>
      <p class="footer-links">
        <a href="index.html" data-i18n="backToCalculator">&larr; Zur&uuml;ck zum Rechner</a>
        <span class="footer-sep">&middot;</span>
        <a href="impressum.html" data-i18n="footerImprint">Impressum</a>
        <span class="footer-sep">&middot;</span>
        <a href="datenschutz.html" data-i18n="footerPrivacy">Datenschutz</a>
      </p>
    </footer>
  </main>

  <script src="src/i18n.js"></script>
  <script>
    document.documentElement.lang = TFW.getLang();

    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      var key = el.getAttribute('data-i18n');
      var translated = TFW.t(key);
      if (translated !== key) el.textContent = translated;
    });

    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.lang === TFW.getLang());
      btn.addEventListener('click', function() {
        TFW.setLang(btn.dataset.lang);
        window.location.reload();
      });
    });

    if (window.location.hash === "#success") {
      document.getElementById("contact-form").classList.add("hidden");
      document.getElementById("contact-success").classList.remove("hidden");
    }
  </script>
</body>
</html>
